version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_db
    restart: always
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile
    container_name: crm_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://crm_user:crm_pass@db:5432/crm_db
    depends_on:
      db:
        condition: service_healthy
    # Для автоматического создания таблиц при старте можно добавить небольшую задержку
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...';
        sleep 5;
        echo 'Starting FastAPI...';
        uvicorn src.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: deploy/Dockerfile
    container_name: crm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: